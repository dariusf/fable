<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <!-- stop google thinking this page is in spanish -->
    <!-- <meta name="google" content="notranslate" /> -->

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fable Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.20.0/src-min-noconflict/ace.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.20.0/src-min-noconflict/ext-language_tools.min.js"></script>
    <style>
      :root {
        --main-bg-color: #f7f7f7;
        --main-bg-color-lighter: #fafafa;
        --main-fg-color: #000000;
        --divider-color: var(--main-bg-color-lighter);
        --control-border-color: var(--main-bg-color-lighter);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --main-bg-color: #202124;
          --main-bg-color-lighter: #4e5159;
          --main-fg-color: #e8eaed;
          --divider-color: var(--main-bg-color);
          --control-border-color: var(--main-bg-color-lighter);
        }
      }

      @media (prefers-color-scheme: light) {
        :root {
          --control-border-color: color-mix(
            in srgb,
            var(--main-bg-color) 75%,
            var(--main-fg-color) 25%
          );
        }
      }

      body {
        background-color: var(--main-bg-color);
        color: var(--main-fg-color);
        font-family:
          -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto,
          Ubuntu;
      }
      * {
        scrollbar-color: var(--main-bg-color-lighter) var(--main-bg-color);
        scrollbar-width: thin;
      }
      a,
      a:visited {
        color: var(--main-fg-color);
        font-size: 14px;
      }
      label {
        color: var(--main-fg-color);
        background-color: var(--main-bg-color);
        font-size: 14px;
      }
      /* input[type="checkbox"]:checked::before {
        background-color: var(--main-bg-color);
      } */
      input[type="checkbox"] {
        accent-color: var(--main-bg-color);
        color: var(--main-fg-color);
        /* background-color: var(--main-bg-color); */
      }
      iframe {
        border: 0px;
      }
      button.btn,
      select {
        background-color: var(--main-bg-color);
        color: var(--main-fg-color);
        border: 1px solid var(--control-border-color);
        border-radius: 4px;
        padding: 4px 8px;
        cursor: pointer;
      }

      button.btn:hover,
      select:hover {
        background-color: var(--main-bg-color-lighter);
      }

      /* layout taken from https://github.com/mwillsey/egg-smol */
      body {
        margin: 0;
        display: flex;
        height: 100vh;
        width: 100vw;
      }

      #editor {
        width: 50%;
        resize: horizontal;
        margin: 10px;
        visibility: hidden;
      }

      #panel {
        padding: 10px;
        flex: 1 1 0;
        border-left: 2px solid var(--divider-color);

        display: flex;
        flex-flow: column;
      }

      #toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Ace overlay UIs ship separate extension CSS and do not fully inherit the editor theme. Bridge them to the page theme with a small shared layer. */
      :root {
        --ace-ui-bg: var(--main-bg-color);
        --ace-ui-fg: var(--main-fg-color);
        --ace-ui-border: var(--main-bg-color-lighter);
        --ace-ui-surface: var(--main-bg-color-lighter);
        --ace-ui-selected-border: var(--main-fg-color);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --ace-ui-border: color-mix(
            in srgb,
            var(--main-bg-color) 75%,
            var(--main-fg-color) 25%
          );
          --ace-ui-selected-border: color-mix(
            in srgb,
            var(--main-bg-color) 20%,
            var(--main-fg-color) 80%
          );
        }
      }

      #ace_settingsmenu,
      #kbshortcutmenu,
      .ace_search {
        background: var(--ace-ui-bg) !important;
        color: var(--ace-ui-fg) !important;
        border-color: var(--ace-ui-border) !important;
        opacity: 1 !important;
      }

      #ace_settingsmenu,
      #kbshortcutmenu {
        border-left: 1px solid var(--ace-ui-border) !important;
        box-shadow: -16px 0 32px rgba(0, 0, 0, 0.35) !important;
      }

      #ace_settingsmenu table,
      #ace_settingsmenu tr,
      #ace_settingsmenu td,
      #ace_settingsmenu label,
      #ace_settingsmenu span,
      #ace_settingsmenu div,
      #kbshortcutmenu table,
      #kbshortcutmenu tr,
      #kbshortcutmenu td,
      #kbshortcutmenu label,
      #kbshortcutmenu span,
      #kbshortcutmenu div,
      .ace_search_form,
      .ace_replace_form,
      .ace_search_options,
      .ace_search_counter,
      .ace_button {
        color: var(--ace-ui-fg) !important;
        background: transparent !important;
        border-color: var(--ace-ui-border) !important;
      }

      #ace_settingsmenu .ace_optionsMenuEntry:hover,
      #kbshortcutmenu .ace_optionsMenuEntry:hover {
        background: transparent !important;
        transition: none !important;
      }

      #ace_settingsmenu .ace_optionsMenuKey,
      #ace_settingsmenu .ace_optionsMenuCommand,
      #kbshortcutmenu .ace_optionsMenuKey,
      #kbshortcutmenu .ace_optionsMenuCommand {
        color: var(--ace-ui-fg) !important;
      }

      #ace_settingsmenu .ace_closeButton,
      #kbshortcutmenu .ace_closeButton,
      #ace_settingsmenu input,
      #ace_settingsmenu select,
      #ace_settingsmenu button,
      #kbshortcutmenu input,
      #kbshortcutmenu select,
      #kbshortcutmenu button,
      .ace_search_field,
      .ace_searchbtn {
        background: var(--ace-ui-bg) !important;
        color: var(--ace-ui-fg) !important;
        border: 1px solid var(--ace-ui-border) !important;
        box-shadow: none !important;
        font-weight: normal !important;
      }

      #ace_settingsmenu button[ace_selected_button="true"],
      #kbshortcutmenu button[ace_selected_button="true"] {
        border-color: var(--ace-ui-selected-border) !important;
        color: var(--ace-ui-fg) !important;
        background: var(--ace-ui-bg) !important;
        box-shadow: none !important;
      }

      #ace_settingsmenu button:hover,
      #ace_settingsmenu select:hover,
      #ace_settingsmenu input:hover,
      #kbshortcutmenu button:hover,
      #kbshortcutmenu select:hover,
      #kbshortcutmenu input:hover,
      .ace_searchbtn:hover,
      .ace_searchbtn:focus {
        background: var(--ace-ui-surface) !important;
      }

      #ace_settingsmenu button:focus,
      #ace_settingsmenu select:focus,
      #ace_settingsmenu input:focus,
      #kbshortcutmenu button:focus,
      #kbshortcutmenu select:focus,
      #kbshortcutmenu input:focus,
      .ace_search_field:focus,
      .ace_searchbtn:focus {
        outline: 1px solid var(--ace-ui-fg) !important;
        outline-offset: 1px;
      }

      #ace_settingsmenu button[ace_selected_button="true"]:focus,
      #kbshortcutmenu button[ace_selected_button="true"]:focus {
        outline: none !important;
      }

      .ace_search_field {
        border-color: var(--ace-ui-border) !important;
      }

      .ace_searchbtn.prev:after,
      .ace_searchbtn.next:after {
        border-color: var(--ace-ui-fg) !important;
      }

      .ace_searchbtn_close {
        filter: invert(0.85) !important;
      }

      .ace_button:hover,
      .ace_button:focus,
      .ace_button:active,
      .ace_button.checked {
        background: var(--ace-ui-surface) !important;
        color: var(--ace-ui-fg) !important;
      }
    </style>
  </head>

  <body>
    <div id="editor"></div>
    <div id="panel">
      <div id="toolbar">
        <select
          name="examples"
          id="examples"
          onchange="load_selected_example()"
        >
          <option value="custom" disabled hidden>Custom</option>
          $MORE
        </select>
        <button class="btn" id="back-btn" onclick="back()">Back</button>
        <button class="btn" onclick="restart()">Restart</button>
        <button class="btn" onclick="graph()">Graph</button>
        <!-- <button class="btn" onclick="reload()">Reload</button> -->
        <a
          href="https://github.com/dariusf/fable/blob/master/docs.md"
          target="_blank"
          >Docs</a
        >
        <button class="btn" onclick="openFile()">Open</button>
        <button class="btn" onclick="save()">Save</button>
        <button class="btn" onclick="publish()">Publish</button>
        <button class="btn" onclick="share()">Share</button>
        <!-- prevent the checkbox and label from wrapping separately -->
        <!-- <span style="display: inline-block">
          <input
            type="checkbox"
            id="fastreload"
            style="vertical-align: middle"
          />
          <label for="fastreload" style="vertical-align: middle"
            >Fast reload</label
          >
        </span> -->
      </div>
      <div id="content"></div>
      <!-- https://web.dev/articles/sandboxed-iframes#safely_sandboxing_eval -->
      <iframe
        sandbox="allow-scripts"
        src="story.html"
        style="width: 100%; height: 100%"
      ></iframe>
    </div>
    <!-- <script type="text/javascript" src="page.js"></script> -->
    <!-- hipjs logs to the console (page) -->
    <!-- <script type="text/javascript" src="hipjs.bc.js"></script> -->
    <!-- bundle.js/main.js requires ocaml_ready (hipjs) and enable_buttons (page) to be defined -->
    <!-- <script type="text/javascript" src="bundle.js"></script> -->
    <script type="text/javascript" src="editor.js"></script>

    <!-- <script type="text/javascript" src="story.js"></script> -->
    <!-- <script type="text/javascript" src="interpret.js"></script> -->
    <script>
      main();
    </script>
  </body>
</html>
